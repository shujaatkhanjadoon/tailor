<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — DarziHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
      border: 1px solid #e2e8f0;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1.25rem; }
    h1 { font-size: 1.375rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
    .tip {
      background: #eff6ff; border-radius: 12px; padding: 0.875rem 1rem;
      font-size: 0.8rem; color: #1d4ed8; text-align: left;
      margin-bottom: 1.5rem; line-height: 1.6;
    }
    button {
      background: #2563eb; color: white; border: none;
      font-size: 0.9rem; font-weight: 600;
      padding: 0.875rem 2rem; border-radius: 14px;
      cursor: pointer; width: 100%;
    }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <h1>Internet Nahi Hai</h1>
    <p>
      Aap abhi offline hain. DarziHub aapka data locally store karta hai
      — aap orders aur measurements dekh sakte hain.
    </p>
    <div class="tip">
      💡 Internet wapas aane par sab data automatically sync ho jayega.
    </div>
    <button onclick="window.location.reload()">
      Dobara Try Karein
    </button>
  </div>
</body>
</html>
